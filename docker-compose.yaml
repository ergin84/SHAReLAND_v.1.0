services:
  db:
    image: postgres:17
    container_name: shareland_pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: shareland_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"  # Host 5433 (local PostgreSQL uses 5432)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - shareland_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: shareland_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@shareland.example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./backups:/backups
    networks:
      - shareland_network
    depends_on:
      - db

volumes:
  postgres_data:
  pgadmin_data:

networks:
  shareland_network: