# Rate limiting zone
limit_req_zone $binary_remote_addr zone=shareland_limit:10m rate=10r/s;
limit_req_status 429;

# Cache configuration
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=shareland_cache:10m max_size=100m inactive=60m use_temp_path=off;

# Upstream configuration for load balancing
upstream shareland_backend {
    least_conn;
    server django:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Main HTTP server (for local development)
server {
    listen 80;
    server_name localhost;
    
    # Max body size for uploads
    client_max_body_size 20M;
    client_body_timeout 60s;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    
    # Static files with aggressive caching
    location /static/ {
        alias /app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Media files with moderate caching
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }
    
    # Health checks (no rate limit)
    location /health/ {
        proxy_pass http://shareland_backend;
        access_log off;
    }
    
    # Favicon
    location = /favicon.ico {
        alias /app/static/frontend/favicon.ico;
        access_log off;
        log_not_found off;
    }
    
    # Application routes with rate limiting
    location / {
        # Rate limiting
        limit_req zone=shareland_limit burst=20 nodelay;
        
        # Proxy configuration
        proxy_pass http://shareland_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
    
    # Block common exploit attempts
    location ~ /\.(?!well-known) {
        deny all;
    }
    
    location ~ /\.(git|svn|hg|bzr) {
        deny all;
    }
}
